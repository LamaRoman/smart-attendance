<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1284 2778" width="1284" height="2778">
  <!-- Background -->
  <rect width="1284" height="2778" fill="#F9FAFB"/>

  <!-- Blue square housing A -->
  <rect x="387" y="1050" width="310" height="310" rx="72" fill="#2563EB"/>

  <!-- A inside blue square -->
  <text x="542" y="1258" text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-weight="700" font-size="248" fill="white">A</text>

  <!-- x beside in dark -->
  <text x="868" y="1258" text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-weight="700" font-size="248" fill="#111827">x</text>

  <!-- Blue underline — centered -->
  <rect x="387" y="1394" width="492" height="18" rx="9" fill="#2563EB"/>

  <!-- Attend  Xpress — two spaces -->
  <text x="633" y="1510" text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-weight="700" font-size="86" fill="#111827" letter-spacing="2">Attend  Xpress</text>

  <!-- Tagline -->
  <text x="642" y="1590" text-anchor="middle"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="48" fill="#9CA3AF" letter-spacing="6">SMART ATTENDANCE</text>
</svg>
